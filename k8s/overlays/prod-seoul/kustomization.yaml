# -----------------------------------------------------------------------------
# 서울(ap-northeast-2) 프로덕션 오버레이 — 값은 terraform/ 리소스와 아래 표를 맞출 것.
#
# | 항목 | Terraform 참조 | 비고 |
# |------|----------------|------|
# | 컨테이너 이미지 ECR | `aws_ecr_repository.be` | `terraform output -raw ecr_be_repository_url` 로 얻은 URL을 images.newName에 사용 (태그 없음 + newTag) |
# | 리전 | `var.region` 기본 `ap-northeast-2` | ConfigMap AWS_REGION |
# | DB 호스트(Current: EC2 DB) | `aws_instance.db_server` | 동일 VPC EKS 워커에서 접근 시 `terraform output -raw db_server_private_ip` |
# | Redis | `ec2_db.tf` user_data 동반 Redis | `redis://<db_server_private_ip>:6379/0` (ECS와 동일 패턴) |
# | S3 미디어 버킷 | `aws_s3_bucket.media` | 버킷명 `${project_name}-media-bucket` → 기본 `puppytalk-media-bucket` |
# | ALB | `aws_lb` 등 (alb.tf) | ECS 백엔드용과 별도; EKS 외부 노출은 Ingress 컨트롤러로 별도 구성 |
#
# 배포 전: kubectl create namespace puppytalk
# 빌드 확인: kubectl kustomize k8s/overlays/prod-seoul
# 적용:      kubectl apply -k k8s/overlays/prod-seoul
#
# 비밀값(DB 비밀번호, JWT 등)은 Git에 넣지 말고 External Secrets / Sealed Secrets / CI 주입.
# Argo Rollouts Controller 설치: k8s/base/rollout.yaml 상단 주석.
# -----------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: puppytalk

resources:
  - ../../base

configMapGenerator:
  - name: puppytalk-prod-seoul-env
    options:
      disableNameSuffixHash: true
    literals:
      - AWS_REGION=ap-northeast-2
      - STORAGE_BACKEND=s3
      - S3_BUCKET_NAME=puppytalk-media-bucket
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_NAME=puppytalk
      # 동일 VPC·EC2 DB 사용 시: terraform output -raw db_server_private_ip 값으로 설정
      - DB_HOST=REPLACE_WITH_TERRAFORM_OUTPUT_db_server_private_ip
      # 예: redis://10.0.x.x:6379/0 — DB EC2와 동일 private IP (ec2_db.tf)
      - REDIS_URL=redis://REPLACE_WITH_TERRAFORM_OUTPUT_db_server_private_ip:6379/0

patches:
  - path: patch-rollout-envfrom.json
    target:
      kind: Rollout
      name: puppytalk-api

# 이미지: terraform/ecr.tf 의 repository URL과 일치해야 함 (태그는 newTag).
#   terraform -chdir=terraform output -raw ecr_be_repository_url
# 출력 예: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/puppytalk-be
images:
  - name: puppytalk-be
    newName: 997784789037.dkr.ecr.ap-northeast-2.amazonaws.com/puppytalk-be
    newTag: latest
