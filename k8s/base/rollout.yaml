# -----------------------------------------------------------------------------
# 이 Rollout을 적용·조작하려면 클러스터에 Argo Rollouts Controller가 설치되어 있어야 합니다.
#   - 공식 매니페스트: kubectl create namespace argo-rollouts
#     kubectl apply -n argo-rollouts -f https://github.com/argoproj/argo-rollouts/releases/latest/download/install.yaml
#   - 또는 Helm: helm install argo-rollouts argo/argo-rollouts -n argo-rollouts --create-namespace
# Controller 미설치 시 Rollout 리소스는 Reconcile되지 않습니다.
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: puppytalk-api
  labels:
    app.kubernetes.io/name: puppytalk-api
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: puppytalk-api
  template:
    metadata:
      labels:
        app: puppytalk-api
    spec:
      containers:
        - name: api
          image: puppytalk-be:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
  strategy:
    blueGreen:
      activeService: puppytalk-api-active
      previewService: puppytalk-api-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 30
