# -----------------------------------------------------------------------------
# 저장소 루트(2-kyjness-community-infra) 기준:
#   kubectl apply -k k8s/overlays/prod-seoul
# Argo Rollouts Controller 클러스터 설치는 k8s/base/rollout.yaml 상단 주석 참고.
# -----------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: puppytalk

resources:
  - rollout.yaml
  - services.yaml

# commonLabels는 Rollout CRD의 Pod 템플릿에 항상 전파되지 않아 Service 셀렉터와 불일치할 수 있어 두지 않았습니다.
